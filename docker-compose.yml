
# =============================================================================
# Apache Spark 4.0.2 — local cluster with optional Kafka
#
# Vanilla mode (default):   docker compose up
# Gluten/Velox mode:        GLUTEN_ENABLED=true docker compose up
#                       or: edit .env → GLUTEN_ENABLED=true
# Kafka mode:               docker compose -f docker-compose.yml -f docker-compose.kafka.yml up
#
# Services:
#   spark-master    — Spark master               :8080 (UI)  :7077 (cluster)
#   spark-worker-1  — Worker 1                   :8081 (UI)
#   spark-worker-2  — Worker 2                   :8083 (UI)
#   spark-history   — History Server             :18080
#   notebook        — JupyterLab                 :8888
#   spark-connect   — Spark Connect (gRPC)       :15002
#
#   kafka           — Kafka broker               :9094 (host) / kafka:9092 (internal)
#   kafka-ui        — Kafka UI                   :8090
# =============================================================================

# ---------------------------------------------------------------------------
# Shared fragment — applied to every Spark node
# ---------------------------------------------------------------------------
x-spark-common: &spark-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false          # .env is optional; falls back to defaults
  volumes:
    - ./data:/workspace/data
    - ./notebooks:/workspace/notebooks
    - ./scripts:/workspace/scripts
    - spark-logs:/opt/spark/logs
  networks:
    - spark-net
  restart: unless-stopped

# ---------------------------------------------------------------------------
# Environment presets — switch by changing <<: *vanilla-env → *gluten-env
# or by passing GLUTEN_ENABLED=true on the CLI / in .env
# ---------------------------------------------------------------------------
x-vanilla-env: &vanilla-env
  GLUTEN_ENABLED: "${GLUTEN_ENABLED:-false}"

x-gluten-env: &gluten-env
  GLUTEN_ENABLED: "true"

services:

  # ── Master ─────────────────────────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: spark-master
    hostname: spark-master
    environment:
      <<: *vanilla-env        # change to *gluten-env to hard-code Gluten on master
      SPARK_ROLE: master
    ports:
      - "8080:8080"           # Master Web UI
      - "7077:7077"           # Cluster port
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Worker 1 ───────────────────────────────────────────────────────────────
  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *vanilla-env
      SPARK_ROLE: worker
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_WEBUI_PORT: "8081"
    ports:
      - "8081:8081"

  # ── Worker 2 ───────────────────────────────────────────────────────────────
  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *vanilla-env
      SPARK_ROLE: worker
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_WEBUI_PORT: "8082"
    ports:
      - "8083:8082"

  # ── History Server ─────────────────────────────────────────────────────────
  spark-history:
    <<: *spark-common
    container_name: spark-history
    hostname: spark-history
    environment:
      SPARK_ROLE: history
    ports:
      - "18080:18080"

  # ── JupyterLab Notebook ────────────────────────────────────────────────────
  notebook:
    <<: *spark-common
    container_name: spark-notebook
    hostname: spark-notebook
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *vanilla-env
      SPARK_ROLE: notebook
      JUPYTER_TOKEN: spark
    ports:
      - "8888:8888"           # JupyterLab
      - "4040:4040"           # Spark App UI (active job)

  # ── Spark Connect  ─────────────────────────────────────────────────────────
  spark-connect:
      <<: *spark-common
      container_name: spark-connect
      hostname: spark-connect
      entrypoint: ["/opt/spark/bin/spark-submit"]
      command:
        - --class
        - org.apache.spark.sql.connect.service.SparkConnectServer
        - --master
        - spark://spark-master:7077
        - --conf
        - spark.connect.grpc.binding.host=0.0.0.0
        - --conf
        - spark.connect.grpc.binding.port=15002
        - --conf
        - spark.cores.max=1
        - --conf
        - spark.executor.cores=1
        - --conf
        - spark.executor.memory=512m
        - --conf
        - spark.sql.shuffle.partitions=1
      ports:
        - "15002:15002"
      depends_on:
        spark-master:
          condition: service_healthy
        spark-worker-1:
          condition: service_started
        spark-worker-2:
          condition: service_started

  # ── Kafka ─────────────────────────────────────────────────────────
  kafka:
    build:
        context: .
        dockerfile: kafka.Dockerfile
        args:
          KAFKA_VERSION: "3.9.1"
          SCALA_VERSION: "2.13"
    container_name: kafka
    hostname: kafka
    profiles:
       - kafka
    environment:
       KAFKA_NODE_ID: "1"
       KAFKA_PROCESS_ROLES: "broker,controller"
       KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
       KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094"
       KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
       KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
       KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
       KAFKA_LOG_DIRS: "/var/lib/kafka/data"
       KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
       KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
       KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
       KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
       KAFKA_NUM_PARTITIONS: "3"
    volumes:
       - kafka-data:/var/lib/kafka/data
    networks:
       - spark-net
    ports:
       - "9094:9094"
    healthcheck:
       test: ["CMD", "bash", "-lc", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
       interval: 15s
       timeout: 10s
       retries: 20
    restart: unless-stopped

  # ── Kafka UI─────────────────────────────────────────────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.2.0
    container_name: kafka-ui
    hostname: kafka-ui
    profiles:
      - kafka
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-kafka"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - spark-net
    ports:
      - "8090:8080"
    restart: unless-stopped

volumes:
  spark-logs:
  kafka-data:  

networks:
  spark-net:
    driver: bridge
